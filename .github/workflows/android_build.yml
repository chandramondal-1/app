name: Build and Deploy APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Frontend Dependencies
        working-directory: ./client
        run: npm install --legacy-peer-deps

      - name: Build Frontend
        working-directory: ./client
        run: npm run build

      - name: Confirm Build Output
        working-directory: ./client
        run: |
          if [ ! -d "dist" ]; then
            echo "Error: dist directory not found!"
            exit 1
          fi
          ls -R dist

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Sync Capacitor
        working-directory: ./client
        run: |
          npx cap sync android || (npx cap add android && npx cap sync android)

      - name: Build Android App (APK)
        working-directory: ./client/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Prepare Download Folder
        run: |
          mkdir -p deploy
          cp client/android/app/build/outputs/apk/debug/app-debug.apk deploy/sunseating.apk
          # Add a simple index.html so the page isn't empty
          echo "<h1>SunSeating App</h1><p><a href='sunseating.apk'>Download APK</a></p>" > deploy/index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: deploy
          branch: gh-pages
