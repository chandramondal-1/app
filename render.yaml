services:
  # Backend Server
  - type: web
    name: sunseating-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sunseating-db
          property: connectionString

databases:
  # PostgreSQL Database
  - name: sunseating-db
    plan: free
    postgresMajorVersion: "16"
