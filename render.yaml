services:
  # 1. Backend Server
  - type: web
    name: sunseating-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: sunseating-db
          property: connectionString

  # 2. Frontend (Static Site) - OPTIMIZED
  - type: static
    name: sunseating-frontend
    plan: free
    rootDir: client
    buildCommand: npm install --legacy-peer-deps && npm run build
    publishDir: dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: sunseating-server
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  # 3. PostgreSQL Database
  - name: sunseating-db
    plan: free
    postgresMajorVersion: "16"
